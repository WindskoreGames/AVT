<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVT – Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d12;
      --card: #121622;
      --accent: #7c5cff;
      --accent2: #00ffd5;
      --text: #e6e9f0;
      --muted: #9aa0b5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #1a1f3a, transparent),
                  radial-gradient(1000px 500px at 90% 10%, #0f3a33, transparent),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 32px 24px;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .tagline {
      color: var(--muted);
      font-size: 14px;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)), var(--card);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stream-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      border-radius: 18px;
      overflow: hidden;
      background: #000;
    }

    .stream-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .stream-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff3b3b;
      box-shadow: 0 0 12px #ff3b3b;
    }

    .actions a {
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #000;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .actions a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(124,92,255,0.4);
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">AVT</div>
    <div class="tagline">Live • Stream • Community</div>
  </header>

  <main>
    <div class="card">
      <div class="stream-wrapper">
        <!-- BYT "CHANNELNAME" TILL DITT DLIVE-NAMN -->
        <iframe
          src="https://dlive.tv/embed/CHANNELNAME"
          allowfullscreen
          scrolling="no"
          allow="autoplay; encrypted-media">
        </iframe>
      </div>

      <div class="stream-info">
        <div class="status">
          <div class="dot"></div>
          <span id="statusText">Sändning</span>
        </div>
      </div>
          <span>Live just nu</span>
        </div>
        
      </div>
    </div>
  </main>

  <footer>
    © 2026 AVT
  </footer>

  <script>
    // true = Live just nu, false = Inspelad sändning
    const isLive = true;

    const statusText = document.getElementById('statusText');
    const dot = document.querySelector('.dot');

    if (isLive) {
      statusText.textContent = 'Live just nu';
      dot.style.background = '#ff3b3b';
      dot.style.boxShadow = '0 0 12px #ff3b3b';
    } else {
      statusText.textContent = 'Inspelad sändning';
      dot.style.background = '#ffaa00';
      dot.style.boxShadow = '0 0 12px #ffaa00';
    }
  </script>
</body>
</html>
