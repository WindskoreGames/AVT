<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVT – Avalons Television</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d12;
      --card: #121622;
      --accent: #7c5cff;
      --accent2: #00ffd5;
      --text: #e6e9f0;
      --muted: #9aa0b5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #1a1f3a, transparent),
                  radial-gradient(1000px 500px at 90% 10%, #0f3a33, transparent),
                  var(--bg);
      color: var(--text);
    }

    header {
      padding: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 18px;
      font-size: 14px;
    }

    nav a:hover { color: var(--text); }

    main { padding: 24px; }

    .featured {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)), var(--card);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .meta {
      margin-top: 14px;
    }

    .meta h2 { margin: 0 0 6px; }
    .meta p { margin: 0; color: var(--muted); font-size: 14px; }

    .section {
      margin-bottom: 40px;
    }

    .section h3 {
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,.5);
    }

    .thumb {
      background: #000;
      border-radius: 14px;
      aspect-ratio: 16 / 9;
      margin-bottom: 10px;
    }

    .card h4 {
      margin: 0 0 4px;
      font-size: 14px;
    }

    .card span {
      font-size: 12px;
      color: var(--muted);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">AVT</div>
  <nav>
    <a href="#">Hem</a>
    <a href="#">Program</a>
    <a href="#">Kategorier</a>
    <a href="#">Om AVT</a>
  </nav>
</header>

<main>

  <!-- HUVUDAVSNITT / PREMIÄR -->
  <section class="featured">
    <div class="video-wrapper">
      <!-- ONE DRIVE EMBED -->
      <iframe src="https://1drv.ms/v/c/e6efb906553240fe/IQQhxdt0NNrcQqWIFMTWh20vAWwpIBT5rKRnMz94tXwyc3I?width=1920&height=1080" allowfullscreen></iframe>
    </div>
    <div class="meta">
      <h2>Premiär 08:00 – Avsnitt 1 - 2 Mars</h2>
      <p>Nyhetsmorgon • Säsong 1</p>
    </div>
  </section>

  <!-- KATEGORI -->
  <section class="section">
    <h3>Nyheter</h3>
    <div class="grid">
      <div class="card">
        <div class="thumb"></div>
        <h4>Nyheter – Avsnitt 1</h4>
        <span>12 min</span>
      </div>
    </div>
  </section>

</main>

<footer>
  © 2026 AVT
</footer>

</body>
</html>
